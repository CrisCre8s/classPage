<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H-FI24-1B · Klassen-Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <h1 class="logo">🎓 H-FI24-1B</h1>
      <p class="subtitle">Klassen-Hub · SBSZ Hermsdorf</p>
    </div>
  </header>

  <!-- Link-Hub -->
  <main class="main">
    <section class="link-section">
      <h2 class="section-title">Schnellzugriff</h2>
      <div id="link-grid" class="link-grid">
        <!-- Karten werden per JavaScript gerendert -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 H-FI24-1B · SBSZ Hermsdorf</p>
  </footer>

  <!-- Chatbot FAB + Fenster -->
  <button id="chat-fab" class="chat-fab" aria-label="Chat oeffnen">💬</button>

  <div id="chat-window" class="chat-window hidden">
    <div class="chat-header">
      <span>🤖 KI-Assistent</span>
      <button id="chat-close" class="chat-close" aria-label="Chat schliessen">&times;</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <form id="chat-form" class="chat-form">
      <input
        id="chat-input"
        class="chat-input"
        type="text"
        placeholder="Frage stellen ..."
        autocomplete="off"
        required
      />
      <button type="submit" class="chat-send" aria-label="Senden">➤</button>
    </form>
  </div>

  <script src="/main.js"></script>
</body>
</html>
